name: Build NasuaOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc \
            g++ \
            cmake \
            xorriso \
            clang \
            lld \
            nasm \
            mtools \
            qemu-system-x86

      - name: Build ISO
        run: |
          make all

      - name: Build HDD image
        run: |
          make all-hdd

      - name: Find generated images
        run: |
          echo "Generated files:"
          find . \( -name "*.iso" -o -name "*.hdd" \) -type f

      - name: Prepare release files
        run: |
          mkdir release

          cp $(find . -name "*.iso" | head -n 1) release/
          cp $(find . -name "*.hdd" | head -n 1) release/

          cd release

          cat > README.md << 'EOF'
# NasuaOS Builds 

## ISO 
Boot from CD/USB: 
  NasuaOS.iso 

## HDD For QEMU: 
  NasuaOS.hdd 
  
  Example: 
    qemu-system-x86_64 -hda NasuaOS.hdd
